{% extends "plugin_page.html" %}

{% block plugin_extra %}
<!-- KS Test 전문가 분석 토글 버튼 -->
<div style="margin-top: 16px; text-align: right;">
    <button id="btnKsDetail" onclick="toggleKsDetail()"
            style="padding: 6px 16px; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600;">
        KS Test 전문가 분석 ▼
    </button>
</div>

<!-- KS Test 전용 패널 (접이식) -->
<div id="ks-detail-panel" style="display: none; margin-top: 12px;">

    <!-- 전문가 차트 새로고침 -->
    <div style="margin-bottom: 8px; text-align: right;">
        <button id="btnExpertRefresh" onclick="onExpertRefresh()"
                style="padding: 6px 20px; border: none; border-radius: 6px; cursor: pointer; background: #0ea5e9; color: white; font-size: 13px; font-weight: 600;">
            전문가 차트 새로고침
        </button>
    </div>

    <!-- 프리셋 -->
    <div style="margin-bottom: 12px; padding: 12px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px;">
        <div style="font-size: 13px; font-weight: 600; margin-bottom: 8px;">Analysis Mode</div>
        <div style="display: flex; gap: 6px; flex-wrap: wrap;">
            <button class="ks-preset-btn active" data-preset="standard" onclick="selectPreset('standard')">Standard</button>
            <button class="ks-preset-btn" data-preset="quick" onclick="selectPreset('quick')">Quick Scan</button>
            <button class="ks-preset-btn" data-preset="precision" onclick="selectPreset('precision')">High Precision</button>
            <button class="ks-preset-btn" data-preset="streaming" onclick="selectPreset('streaming')">Streaming</button>
            <button class="ks-preset-btn" data-preset="small_sample" onclick="selectPreset('small_sample')">Small Sample</button>
        </div>
    </div>

    <!-- 파라미터 -->
    <div style="margin-bottom: 12px; padding: 12px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px;">
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; font-size: 13px;">
            <div>
                <div style="font-weight: 600; margin-bottom: 4px;">Basic</div>
                <label>Window: <input id="param-window" type="number" value="100" step="10" min="10" style="width:60px;"></label><br>
                <label>Alpha: <input id="param-alpha" type="number" value="0.05" step="0.01" min="0.001" max="0.5" style="width:60px;"></label><br>
                <label>Ref Ratio: <input id="param-ratio" type="number" value="0.5" step="0.1" min="0.1" max="0.9" style="width:60px;"></label>
            </div>
            <div>
                <div style="font-weight: 600; margin-bottom: 4px;">Correction</div>
                <label><input type="radio" name="correction" value="none"> None</label><br>
                <label><input type="radio" name="correction" value="bh" checked> BH (FDR)</label><br>
                <label><input type="radio" name="correction" value="bonferroni"> Bonferroni</label>
            </div>
            <div>
                <div style="font-weight: 600; margin-bottom: 4px;">Options</div>
                <label><input type="checkbox" id="param-update-ref" checked> Update reference</label><br>
                <label><input type="checkbox" id="param-remove-outliers"> Remove outliers</label>
            </div>
            <div>
                <div style="font-weight: 600; margin-bottom: 4px;">Method</div>
                <label><input type="radio" name="method" value="asymptotic" checked> Asymptotic</label><br>
                <label><input type="radio" name="method" value="exact"> Exact</label><br>
                <label><input type="radio" name="method" value="bootstrap"> Bootstrap</label>
            </div>
        </div>
        <div style="margin-top: 8px;">
            <button onclick="runExample()" style="padding: 6px 24px; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600;">
                Run Analysis (예제 데이터)
            </button>
        </div>
    </div>

    <!-- 부가 차트 -->
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px;">
        <div style="background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px;">
            <div style="font-size: 13px; font-weight: 600; color: #475569; margin-bottom: 8px;">ECDF Comparison</div>
            <canvas id="ecdf-chart"></canvas>
        </div>
        <div style="background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px;">
            <div style="font-size: 13px; font-weight: 600; color: #475569; margin-bottom: 8px;">D-statistic</div>
            <canvas id="ks-stat-chart"></canvas>
        </div>
    </div>
    <div style="background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px; margin-bottom: 12px;">
        <div style="font-size: 13px; font-weight: 600; color: #475569; margin-bottom: 8px;">p-value (Corrected)</div>
        <canvas id="pvalue-chart"></canvas>
    </div>

    <!-- 결과 -->
    <div id="results-section" style="display: none;">
        <div style="display: flex; gap: 12px; margin-bottom: 12px;">
            <div style="flex:1; text-align:center; padding:12px; background:#fff; border:1px solid #e2e8f0; border-radius:8px;">
                <span id="stat-alarms" style="font-size:1.3rem; font-weight:700;">-</span>
                <span style="display:block; font-size:0.75rem; color:#94a3b8;">Events</span>
            </div>
            <div style="flex:1; text-align:center; padding:12px; background:#fff; border:1px solid #e2e8f0; border-radius:8px;">
                <span id="stat-dstat" style="font-size:1.3rem; font-weight:700;">-</span>
                <span style="display:block; font-size:0.75rem; color:#94a3b8;">Max D-stat</span>
            </div>
            <div style="flex:1; text-align:center; padding:12px; background:#fff; border:1px solid #e2e8f0; border-radius:8px;">
                <span id="stat-pval" style="font-size:1.3rem; font-weight:700;">-</span>
                <span style="display:block; font-size:0.75rem; color:#94a3b8;">Min p-value</span>
            </div>
            <div style="flex:1; text-align:center; padding:12px; background:#fff; border:1px solid #e2e8f0; border-radius:8px;">
                <span id="stat-type" style="font-size:1.3rem; font-weight:700;">-</span>
                <span style="display:block; font-size:0.75rem; color:#94a3b8;">Drift Type</span>
            </div>
        </div>
        <table id="events-table" style="width:100%; border-collapse:collapse; font-size:0.85rem;">
            <thead><tr style="background:#f1f5f9;">
                <th style="padding:8px; text-align:left;">Time</th>
                <th style="padding:8px;">D-stat</th>
                <th style="padding:8px;">p-value</th>
                <th style="padding:8px;">Corrected p</th>
                <th style="padding:8px;">Severity</th>
                <th style="padding:8px;">Type</th>
            </tr></thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<style>
.ks-preset-btn { padding: 5px 14px; border: 1px solid #e2e8f0; border-radius: 6px; background: #fff; cursor: pointer; font-size: 0.82rem; }
.ks-preset-btn:hover { border-color: #3b82f6; color: #3b82f6; }
.ks-preset-btn.active { background: #2563eb; color: white; border-color: #2563eb; font-weight: 600; }
.severity-critical { color: #dc2626; font-weight: 700; }
.severity-warning { color: #d97706; font-weight: 600; }
.severity-normal { color: #16a34a; }
#events-table td { padding: 6px 8px; border-bottom: 1px solid #f1f5f9; text-align: center; }
#events-table td:first-child { text-align: left; }
</style>

<script>
function onExpertRefresh() {
    const btn = document.getElementById('btnExpertRefresh');
    btn.textContent = '로딩 중...';
    btn.style.background = '#94a3b8';
    btn.disabled = true;
    loadExpertFromCache();
    setTimeout(() => {
        btn.textContent = '전문가 차트 새로고침';
        btn.style.background = '#0ea5e9';
        btn.disabled = false;
    }, 1000);
}

function toggleKsDetail() {
    const panel = document.getElementById('ks-detail-panel');
    const btn = document.getElementById('btnKsDetail');
    if (panel.style.display === 'none') {
        panel.style.display = 'block';
        btn.textContent = 'KS Test 전문가 분석 ▲';
        // 패널 열릴 때 캐시 데이터로 전문가 차트 자동 로드
        if (typeof loadExpertFromCache === 'function') loadExpertFromCache();
    } else {
        panel.style.display = 'none';
        btn.textContent = 'KS Test 전문가 분석 ▼';
    }
}
</script>
<script src="{{ url_for('ks_test.static', filename='chart.js') }}"></script>
{% endblock %}
