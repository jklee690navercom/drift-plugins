{% extends "plugin_page.html" %}

{% block plugin_extra %}
<!-- X-bar/R Chart 전문가 분석 토글 버튼 -->
<div style="margin-top: 16px; text-align: right;">
    <button id="btnXbarRDetail" onclick="toggleXbarRDetail()"
            style="padding: 6px 16px; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600;">
        X-bar/R Chart 관리도 상세 ▼
    </button>
</div>

<!-- X-bar/R Chart 전용 패널 (접이식) -->
<div id="xbar-r-detail-panel" style="display: none; margin-top: 12px;">

    <!-- 전문가 차트 새로고침 -->
    <div style="margin-bottom: 8px; text-align: right;">
        <button id="btnExpertRefresh" onclick="onExpertRefresh()"
                style="padding: 6px 20px; border: none; border-radius: 6px; cursor: pointer; background: #0ea5e9; color: white; font-size: 13px; font-weight: 600;">
            전문가 차트 새로고침
        </button>
    </div>

    <!-- 파라미터 -->
    <div style="margin-bottom: 12px; padding: 12px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px;">
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; font-size: 13px;">
            <div>
                <div style="font-weight: 600; margin-bottom: 4px;">X-bar/R Parameters</div>
                <label>Baseline Ratio: <input id="param-baseline" type="number" value="0.5" step="0.1" min="0.1" max="0.9" style="width:60px;"></label><br>
                <label>Subgroup Size: <input id="param-subgroup" type="number" value="5" step="1" min="2" max="25" style="width:60px;"></label>
            </div>
            <div>
                <div style="font-weight: 600; margin-bottom: 4px;">SPC 가이드</div>
                <div style="font-size: 12px; color: #64748b;">
                    CL = X&#773; (전체 평균)<br>
                    UCL = X&#773; + A2 * R&#772;<br>
                    LCL = X&#773; - A2 * R&#772;<br>
                    A2 = 0.577 (n=5)
                </div>
            </div>
        </div>
    </div>

    <!-- 전문가 차트: X-bar Chart + UCL/CL/LCL -->
    <div style="background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px; margin-bottom: 12px;">
        <div style="font-size: 13px; font-weight: 600; color: #475569; margin-bottom: 8px;">X-bar Chart (UCL / CL / LCL)</div>
        <canvas id="xbar-chart-expert" height="250"></canvas>
        <div style="margin-top: 4px;">
            <input type="range" id="expertScroll" min="0" max="1000" value="0"
                   style="width: 100%; height: 6px; cursor: pointer; accent-color: #3b82f6;"
                   oninput="onExpertScroll(this.value)">
        </div>
        <div style="margin-top: 4px; display: flex; gap: 6px; font-size: 11px;">
            <span style="font-weight: 600; color: #475569;">표시 범위:</span>
            <button class="expert-range-btn" onclick="setExpertRange(12)">시간</button>
            <button class="expert-range-btn active" onclick="setExpertRange(288)">일</button>
            <button class="expert-range-btn" onclick="setExpertRange(2016)">주</button>
            <button class="expert-range-btn" onclick="setExpertRange(8640)">월</button>
            <button class="expert-range-btn" onclick="setExpertRange(0)">전체</button>
        </div>
    </div>

    <!-- 결과 -->
    <div id="results-section" style="display: none;">
        <div style="display: flex; gap: 12px; margin-bottom: 12px;">
            <div style="flex:1; text-align:center; padding:12px; background:#fff; border:1px solid #e2e8f0; border-radius:8px;">
                <span id="stat-alarms" style="font-size:1.3rem; font-weight:700;">-</span>
                <span style="display:block; font-size:0.75rem; color:#94a3b8;">Events</span>
            </div>
            <div style="flex:1; text-align:center; padding:12px; background:#fff; border:1px solid #e2e8f0; border-radius:8px;">
                <span id="stat-score" style="font-size:1.3rem; font-weight:700;">-</span>
                <span style="display:block; font-size:0.75rem; color:#94a3b8;">Max Score</span>
            </div>
            <div style="flex:1; text-align:center; padding:12px; background:#fff; border:1px solid #e2e8f0; border-radius:8px;">
                <span id="stat-severity" style="font-size:1.3rem; font-weight:700;">-</span>
                <span style="display:block; font-size:0.75rem; color:#94a3b8;">Max Severity</span>
            </div>
        </div>
        <table id="events-table" style="width:100%; border-collapse:collapse; font-size:0.85rem;">
            <thead><tr style="background:#f1f5f9;">
                <th style="padding:8px; text-align:left;">Time</th>
                <th style="padding:8px;">Score</th>
                <th style="padding:8px;">Severity</th>
                <th style="padding:8px;">Message</th>
            </tr></thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<style>
.severity-critical { color: #dc2626; font-weight: 700; }
.severity-warning { color: #d97706; font-weight: 600; }
.severity-normal { color: #16a34a; }
#events-table td { padding: 6px 8px; border-bottom: 1px solid #f1f5f9; text-align: center; }
#events-table td:first-child { text-align: left; }
.expert-range-btn {
    padding: 2px 8px; border: 1px solid #e2e8f0; border-radius: 3px;
    background: #fff; cursor: pointer;
}
.expert-range-btn:hover { background: #eff6ff; }
.expert-range-btn.active { background: #3b82f6; color: white; border-color: #3b82f6; }
</style>

<script>
function onExpertRefresh() {
    const btn = document.getElementById('btnExpertRefresh');
    btn.textContent = '로딩 중...';
    btn.style.background = '#94a3b8';
    btn.disabled = true;
    loadExpertFromCache();
    setTimeout(() => {
        btn.textContent = '전문가 차트 새로고침';
        btn.style.background = '#0ea5e9';
        btn.disabled = false;
    }, 1000);
}

function toggleXbarRDetail() {
    const panel = document.getElementById('xbar-r-detail-panel');
    const btn = document.getElementById('btnXbarRDetail');
    if (panel.style.display === 'none') {
        panel.style.display = 'block';
        btn.textContent = 'X-bar/R Chart 관리도 상세 ▲';
        if (typeof loadExpertFromCache === 'function') loadExpertFromCache();
    } else {
        panel.style.display = 'none';
        btn.textContent = 'X-bar/R Chart 관리도 상세 ▼';
    }
}
</script>
<script src="{{ url_for('xbar_r_chart.static', filename='chart.js') }}"></script>
{% endblock %}
